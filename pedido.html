<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedido de Servicio</title>
</head>
<body>

  <h1>Realizar Pedido</h1>
    <form action="https://httpbin.org/post" method="post" target ="_blank">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
    
        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono" required><br><br>

        <label for="servicio">Selecciona el servicio:</label>
        <select id="servicio" name="servicio" required>

        <option value="">--Selecciona un servicio--</option>
        <option value="entrenamiento_personal">Entrenamiento Personal</option>
        <option value="clases_grupales">Clases Grupales</option>
        <option value="nutricion">Asesoría Nutricional</option>

        </select><br><br>

       <fieldset>
             <legend>Tipo de Membresía:</legend>

            <label>
             <input type="radio" name="membresia" value="basica" required>
             Básica
             </label><br>

             <label>
             <input type="radio" name="membresia" value="premium">
              Premium
             </label><br>

             <label>
             <input type="radio" name="membresia" value="vip">
                VIP
             </label>

</fieldset><br>

        <label for="fecha">Fecha deseada:</label>
        <input type="date" id="fecha" name="fecha" required><br><br>

        <label for="comentarios">Comentarios:</label><br>
        <textarea id="comentarios" name="comentarios" rows="5" cols="40" placeholder="Escribe tus comentarios aquí..."></textarea><br><br>

        <label>
            <input type="checkbox" name="terminos" value="acepto" required>
            Acepto los términos y condiciones
        </label><br><br>

        <button type="submit">Enviar Pedido</button>
        <button type="reset">Limpiar Formulario</button>
    </form>
</body>
</html>
