    <main>
      <section class="contacto-section">
    <div class="contacto-header">
    <h1>Contacto</h1>
    <p>Completá el formulario y nos ponemos en contacto con vos a la brevedad.</p>
    </div>

        <form class="contacto-form">

          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>

          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required>
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje acá..." required></textarea>
          </div>

          <div class="form-buttons">
            <button type="submit">Enviar</button>
            <button type="reset">Limpiar</button>
          </div>

        </form>
      </section>
    </main>

  </body>
