          </ul>

        </div>
      </nav>
    </header>

    <main>
      <section class="pedido-section">
        <div class="pedido-header">
          <h1>Realizar Pedido</h1>
          <p>Completá el formulario para solicitar nuestros servicios.</p>
        </div>

        <form class="pedido-form" action="https://httpbin.org/post" method="post" target="_blank">

          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>

          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="tucorreo@email.com" required>
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 2911234567" required>
          </div>

          <div class="form-group">
            <label for="servicio">Servicio</label>
            <select id="servicio" name="servicio" required>
              <option value="">--Selecciona un servicio--</option>
              <option value="entrenamiento_personal">Entrenamiento Personal</option>
              <option value="clases_grupales">Clases Grupales</option>
              <option value="nutricion">Asesoría Nutricional</option>
            </select>
          </div>

          <fieldset class="form-fieldset">
            <legend>Tipo de Membresía</legend>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="membresia" value="basica" required>
                <span>Básica</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="membresia" value="premium">
                <span>Premium</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="membresia" value="vip">
                <span>VIP</span>
              </label>
            </div>
          </fieldset>

          <div class="form-group">
            <label for="fecha">Fecha Deseada</label>
            <input type="date" id="fecha" name="fecha" required>
          </div>

          <div class="form-group">
            <label for="comentarios">Comentarios</label>
            <textarea id="comentarios" name="comentarios" rows="4" placeholder="Escribí tus comentarios acá..."></textarea>
          </div>

          <div class="form-checkbox">
            <label class="checkbox-label">
              <input type="checkbox" name="terminos" required>
              <span>Acepto los términos y condiciones</span>
            </label>
          </div>

          <div class="form-buttons">
            <button type="submit">Enviar Pedido</button>
            <button type="reset">Limpiar</button>
          </div>

        </form>
      </section>
    </main>
